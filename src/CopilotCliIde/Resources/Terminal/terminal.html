<!DOCTYPE html>
<html>
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Copilot CLI</title>
	<link rel="stylesheet" href="lib/xterm.css">
	<style>
		* { margin: 0; padding: 0; box-sizing: border-box; }
		html, body { width: 100%; height: 100%; overflow: hidden; background: #1e1e1e; }
		#terminal { width: 100%; height: 100%; }
		/* Hide xterm.js scrollbar — terminal scrollback is handled by keyboard (Shift+PgUp/PgDn) */
		.xterm-viewport::-webkit-scrollbar { display: none; }
		.xterm-viewport { scrollbar-width: none; }
	</style>
</head>
<body>
	<div id="terminal"></div>
	<script src="lib/xterm.js"></script>
	<script src="lib/addon-fit.js"></script>
	<script src="terminal-app.js"></script>
</body>
</html>
