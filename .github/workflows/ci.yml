name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v6

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 10.0.x

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v3

      - name: Restore packages
        run: dotnet restore CopilotCliIde.slnx

      - name: Check formatting
        run: dotnet format CopilotCliIde.slnx whitespace --verify-no-changes --verbosity quiet

      - name: Build VSIX
        run: msbuild src/CopilotCliIde/CopilotCliIde.csproj /p:Configuration=Release /p:DeployExtension=false

      - name: Run tests
        run: dotnet test src/CopilotCliIde.Server.Tests/CopilotCliIde.Server.Tests.csproj --configuration Release

      - name: Upload VSIX
        uses: actions/upload-artifact@v7
        with:
          name: CopilotCliIde
          path: src/CopilotCliIde/bin/Release/CopilotCliIde.vsix
